# Map DON secret names to env var names (used by simulator and deployment).
# In .env set: CRE_ETH_PRIVATE_KEY=0x... (for relayer / admin onchain calls)
# Optional: COMPLIANCE_API_KEY_ALL=... if workflow calls external KYC/compliance API via Confidential HTTP.
secretsNames:
  creRelayerKey:
    - CRE_ETH_PRIVATE_KEY
